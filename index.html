<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calc short for calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div id="calculator">

        <div id="screen"> </div>

        <div id="notScreen">

         <!-- Need to change all of these to buttons cuz im a dumbass -->


            <div id="numbers">
                <div class="number" id="1">1</div>
                <div class="number" id="2">2</div>
                <div class="number" id="3">3</div>
                <div class="number" id="4">4</div>
                <div class="number" id="5">5</div>
                <div class="number" id="6">6</div>
                <div class="number" id="7">7</div>
                <div class="number" id="8">8</div>
                <div class="number" id="9">9</div>
                <div class="number" id="0">0</div>
            </div>

            <div id="operations">
                <div class="operator" id="add">+</div>
                <div class="operator" id="subtract">-</div>
                <div class="operator" id="multiply">X</div>
                <div class="operator" id="divide">/</div>
                <div class="operator" id="equals">=</div>
            </div>
        </div>

        
    </div>

    <script src="script.js"></script>
</body>
</html>
